name: CelliA — Veille quotidienne

on:
  schedule:
    - cron: '0 4 * * *'    # 6h Paris
    - cron: '0 7 * * *'    # 9h Paris
    - cron: '0 10 * * *'   # 12h Paris
    - cron: '0 12 * * *'   # 14h Paris  ← nouveau
    - cron: '0 14 * * *'   # 16h Paris
    - cron: '0 18 * * *'   # 20h Paris
  workflow_dispatch:
    inputs:
      dev_mode:
        description: 'Mode dev (3 articles seulement)'
        required: false
        default: 'false'
        type: boolean
      paid_mode:
        description: 'Mode payant — Gemini 2.5 Flash (clé facturée niveau 1)'
        required: false
        default: 'false'
        type: boolean
      korben_mode:
        description: 'Spécial Korben — tous les articles du jour de korben.info'
        required: false
        default: 'false'
        type: boolean
      fond_mode:
        description: 'Article de fond — sélection + réécriture longue forme (API payante requise)'
        required: false
        default: 'false'
        type: boolean
      mistral_boost:
        description: 'CRON Mistral latest — mistral-small-latest JSON 3000 tok · 20 articles'
        required: false
        default: 'false'
        type: boolean

jobs:
  fetch-and-deploy:
    name: Fetch RSS → Mistral → GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Fetch & rewrite
        working-directory: scripts
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_PAID_API_KEY: ${{ secrets.GEMINI_PAID_API_KEY }}
          USE_PAID_GEMINI:     ${{ github.event.inputs.paid_mode }}
          USE_KORBEN:          ${{ github.event.inputs.korben_mode }}
          USE_FOND:            ${{ github.event.inputs.fond_mode }}
          USE_MISTRAL_BOOST:   ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.mistral_boost }}
        run: |
          if [ "${{ github.event.inputs.dev_mode }}" = "true" ]; then
            node fetch.js --dev
          else
            node fetch.js
          fi

      - name: Verify
        run: |
          if [ ! -f dist/articles.json ] || [ ! -f dist/articles-full.json ]; then exit 1; fi
          COUNT=$(node -e "console.log(require('./dist/articles.json').count)")
          echo "✓ $COUNT articles"

      - name: Commit articles
        run: |
          git config user.name  "CelliA Bot"
          git config user.email "cellia-bot@noreply.github.com"
          git add dist/articles.json dist/articles-full.json
          git add dist/articles-fond.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Rien à commiter"
          else
            git commit -m "chore: articles $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Notification push
        if: success()
        run: |
          COUNT=$(node -e "console.log(require('./dist/articles.json').count)" 2>/dev/null || echo "?")
          curl -s \
            -H "Title: CelliA — Veille tech" \
            -H "Priority: default" \
            -H "Tags: newspaper" \
            -d "✅ $COUNT articles disponibles" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }} || true

      - name: Summary
        if: always()
        run: |
          echo "## CelliA" >> $GITHUB_STEP_SUMMARY
          if [ -f dist/articles.json ]; then
            COUNT=$(node -e "console.log(require('./dist/articles.json').count)")
            DATE=$(node -e "console.log(require('./dist/articles.json').generated_at)")
            echo "✅ **$COUNT articles** — \`$DATE\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Échec" >> $GITHUB_STEP_SUMMARY
          fi
