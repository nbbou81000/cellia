<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CelliA — Statut des services IA</title>
  <meta name="description" content="Disponibilité en temps réel des APIs IA : Mistral, OpenAI, Claude, Gemini, Groq">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="prefs.js" defer></script>
  <style>
    :root {
      --bg:#1a1c22;--bg2:#12141a;--glass-card:rgba(255,255,255,.04);
      --border:rgba(255,255,255,.08);--border-soft:rgba(255,255,255,.05);
      --text-hi:#f0f2f8;--text-dim:#94a3b8;--text-dimmer:#475569;
      --red:#ff5a4e;--font-ui:system-ui,-apple-system,sans-serif;
      --radius:12px;
    }
    [data-theme="light"] {
      --bg:#f4f4f0;--bg2:#ebebea;--glass-card:rgba(0,0,0,.03);
      --border:rgba(0,0,0,.08);--border-soft:rgba(0,0,0,.04);
      --text-hi:#1a1c22;--text-dim:#64748b;--text-dimmer:#94a3b8;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--font-ui);background:var(--bg);color:var(--text-hi);min-height:100vh; }

    /* Navbar */
    .navbar {
      position:sticky;top:0;z-index:100;
      background:rgba(26,28,34,.88);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      height:48px;padding:0 20px;
      display:flex;align-items:center;justify-content:space-between;
    }
    [data-theme="light"] .navbar { background:rgba(244,244,240,.88); }
    .nav-logo { font-weight:800;font-size:15px;letter-spacing:-.03em;text-decoration:none;color:var(--text-hi); }
    .nav-logo span { color:var(--red); }
    .nav-back {
      font-size:12px;color:var(--text-dim);text-decoration:none;
      padding:5px 12px;border:1px solid var(--border);border-radius:8px;
      transition:color .15s,border-color .15s;
    }
    .nav-back:hover { color:var(--text-hi);border-color:rgba(255,255,255,.2); }

    /* Bandeau incident */
    .incident-banner {
      background:rgba(239,68,68,.12);
      border-bottom:1px solid rgba(239,68,68,.3);
      padding:8px 20px;
      display:flex;align-items:center;gap:10px;
      font-size:12px;color:#fca5a5;
      animation:fadeIn .3s ease;
    }
    .incident-banner-dot {
      width:7px;height:7px;border-radius:50%;
      background:#ef4444;flex-shrink:0;
      box-shadow:0 0 8px #ef4444;
      animation:pulse 1.5s ease-in-out infinite;
    }
    .incident-banner a { color:#fca5a5;text-decoration:underline;margin-left:auto; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none} }

    /* Layout */
    .wrap { max-width:820px;margin:0 auto;padding:28px 20px 48px; }

    /* Header */
    .page-header { margin-bottom:24px; }
    .page-eyebrow { font-size:10px;font-weight:700;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px; }
    .page-title { font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px; }
    .page-sub { font-size:13px;color:var(--text-dim); }

    /* Barre globale */
    .global-bar {
      display:flex;align-items:center;gap:12px;
      padding:12px 16px;border-radius:10px;margin-bottom:20px;
      transition:background .3s,border-color .3s;
    }
    .global-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
    .global-text { font-size:14px;font-weight:700;flex:1; }
    .global-time { font-size:10px;color:var(--text-dimmer);font-family:monospace; }

    /* Score santé globale */
    .health-score-row {
      display:flex;align-items:center;gap:14px;
      padding:12px 16px;border-radius:10px;margin-bottom:20px;
      background:var(--glass-card);border:1px solid var(--border-soft);
    }
    .health-ring { flex-shrink:0; }
    .health-info { flex:1; }
    .health-label { font-size:10px;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px; }
    .health-value { font-size:18px;font-weight:800;letter-spacing:-.02em; }
    .health-bar-track {
      flex:1;height:5px;border-radius:3px;
      background:rgba(255,255,255,.06);overflow:hidden;
    }
    .health-bar-fill {
      height:100%;border-radius:3px;
      transition:width .6s ease;
    }

    /* Mini stats */
    .stats-grid { display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px; }
    .stat-card {
      background:var(--glass-card);border:1px solid var(--border-soft);
      border-radius:10px;padding:10px 12px;text-align:center;
      transition:border-color .2s;
    }
    .stat-icon { font-size:18px;margin-bottom:4px; }
    .stat-name { font-size:10px;color:var(--text-dim);margin-bottom:2px; }
    .stat-pct  { font-size:12px;font-weight:700; }

    /* Section label */
    .section-label {
      display:flex;align-items:center;gap:12px;margin-bottom:12px;
    }
    .section-title { font-size:10px;font-weight:700;color:var(--text-dimmer);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap; }
    .section-line  { flex:1;height:1px;background:var(--border); }

    /* Provider card */
    .provider-card { margin-bottom:10px;border-radius:12px;overflow:hidden; }
    .provider-btn {
      width:100%;padding:14px 18px;text-align:left;cursor:pointer;
      background:var(--glass-card);border:1px solid var(--border);
      border-radius:12px;font-family:var(--font-ui);
      transition:border-color .2s,background .2s;
    }
    .provider-btn:hover { background:rgba(255,255,255,.06); }
    .provider-btn.open  { border-radius:12px 12px 0 0; }
    .provider-row { display:flex;align-items:center;gap:12px;margin-bottom:10px; }
    .provider-icon { font-size:20px; }
    .provider-info { flex:1; }
    .provider-name { font-size:14px;font-weight:800;color:var(--text-hi);margin-bottom:3px; }
    .provider-name-row { display:flex;align-items:center;gap:8px; }
    .provider-desc { font-size:11px;color:var(--text-dimmer); }
    .provider-uptime { text-align:right; }
    .provider-pct  { font-size:13px;font-weight:700; }
    .provider-label{ font-size:10px;color:var(--text-dimmer); }
    .provider-chevron { font-size:11px;color:var(--text-dimmer);margin-left:4px; }

    /* Sparkline */
    .sparkline-row { display:flex;align-items:center;gap:8px; }
    .sparkline-labels { display:flex;flex-direction:column;justify-content:space-between;height:32px; }
    .sparkline-label { font-size:8px;color:var(--text-dimmer);font-family:monospace; }

    /* Badge */
    .badge {
      display:inline-flex;align-items:center;gap:4px;
      font-size:10px;font-weight:700;padding:2px 8px;
      border-radius:20px;border:1px solid transparent;
    }
    .badge-dot { width:5px;height:5px;border-radius:50%;display:inline-block; }

    /* Durée incident */
    .incident-duration {
      font-size:10px;color:#f59e0b;
      background:rgba(245,158,11,.08);
      border:1px solid rgba(245,158,11,.2);
      border-radius:6px;padding:1px 7px;
      display:inline-flex;align-items:center;gap:4px;
    }

    /* Composants */
    .components-panel {
      border:1px solid var(--border);border-top:none;
      border-radius:0 0 12px 12px;
      background:rgba(0,0,0,.2);
      display:none;
    }
    .components-panel.open { display:block; }

    /* Heatmap */
    .heatmap-section {
      padding:10px 16px 4px;
      border-bottom:1px solid var(--border-soft);
    }
    .heatmap-label-row {
      display:flex;justify-content:space-between;
      font-size:8px;color:var(--text-dimmer);font-family:monospace;
      margin-bottom:5px;
    }
    .heatmap-grid {
      display:flex;gap:2px;
    }
    .heatmap-col { display:flex;flex-direction:column;gap:2px; }
    .heatmap-cell {
      width:10px;height:10px;border-radius:2px;
      transition:opacity .15s;
      cursor:default;
    }
    .heatmap-cell:hover { opacity:.7; }

    /* Timeline incidents */
    .timeline-section {
      padding:10px 16px 12px;
      border-bottom:1px solid var(--border-soft);
    }
    .timeline-title {
      font-size:9px;font-weight:700;color:var(--text-dimmer);
      letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;
    }
    .timeline-empty { font-size:11px;color:var(--text-dimmer); }
    .timeline-item {
      display:flex;gap:10px;align-items:flex-start;
      margin-bottom:6px;
      position:relative;
    }
    .timeline-line {
      position:absolute;left:5px;top:14px;bottom:-6px;
      width:1px;background:var(--border);
    }
    .timeline-dot {
      width:11px;height:11px;border-radius:50%;
      flex-shrink:0;margin-top:2px;
      border:2px solid var(--bg);
      position:relative;z-index:1;
    }
    .timeline-body { flex:1; }
    .timeline-event { font-size:11px;color:var(--text-hi);font-weight:600; }
    .timeline-meta { font-size:10px;color:var(--text-dimmer);margin-top:1px; }

    /* Composants list */
    .components-grid { display:grid;grid-template-columns:1fr 1fr; }
    .component-row {
      display:flex;align-items:center;justify-content:space-between;
      padding:5px 16px;
    }
    .component-name { font-size:11px;color:var(--text-dim); }
    .component-name.issue { color:var(--text-hi);font-weight:600; }
    .component-status { display:flex;align-items:center;gap:4px;font-size:10px; }
    .component-dot { width:5px;height:5px;border-radius:50%; }
    .components-footer { padding:5px 16px 8px;font-size:10px;color:var(--text-dimmer); }

    /* Info footer */
    .info-box {
      margin-top:24px;padding:14px 16px;border-radius:8px;
      background:var(--glass-card);border:1px solid var(--border-soft);
      font-size:11px;color:var(--text-dimmer);line-height:1.7;
    }
    .info-box a { color:var(--text-dim);text-decoration:none; }
    .info-box a:hover { color:var(--text-hi); }

    /* Loading */
    .loading { text-align:center;padding:60px 20px;color:var(--text-dim); }
    .loading-spinner {
      width:28px;height:28px;border-radius:50%;
      border:2px solid var(--border);border-top-color:var(--red);
      animation:spin .8s linear infinite;
      margin:0 auto 12px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Graphique comparatif */
    .compare-section {
      background:var(--glass-card);border:1px solid var(--border-soft);
      border-radius:12px;padding:14px 16px;margin-bottom:20px;
    }
    .compare-title-row {
      display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
    }
    .compare-title { font-size:10px;font-weight:700;color:var(--text-dimmer);letter-spacing:.1em;text-transform:uppercase; }
    .compare-legend { display:flex;gap:12px; }
    .compare-legend-item { display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-dimmer); }
    .compare-legend-dot { width:6px;height:6px;border-radius:50%; }
    .compare-rows { display:flex;flex-direction:column;gap:6px; }
    .compare-row { display:flex;align-items:center;gap:10px; }
    .compare-name { font-size:10px;color:var(--text-dim);width:90px;flex-shrink:0;text-align:right; }
    .compare-track { flex:1;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;position:relative; }
    .compare-fill { height:100%;border-radius:3px;transition:width .6s ease; }
    .compare-pct { font-size:10px;font-weight:700;width:36px;text-align:right; }

    @media(max-width:600px) {
      .stats-grid { grid-template-columns:repeat(3,1fr); }
      .components-grid { grid-template-columns:1fr; }
      .compare-name { width:60px;font-size:9px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="./" class="nav-logo">Celli<span>A</span></a>
    <a href="./" class="nav-back">← Retour</a>
  </nav>

  <div id="incident-banner-container"></div>

  <div class="wrap">
    <div class="page-header">
      <div class="page-eyebrow">CELLIA · MONITORING</div>
      <h1 class="page-title">Statut des services IA</h1>
      <p class="page-sub">Disponibilité en temps réel · Vérification automatique toutes les 15 min</p>
    </div>

    <div id="status-content">
      <div class="loading">
        <div class="loading-spinner"></div>
        Chargement des données de statut…
      </div>
    </div>
  </div>

  <script>
  // ── Configuration ─────────────────────────────────────────────────────────
  const PROVIDERS_META = {
    openai:    { name:'OpenAI',             icon:'⬡' },
    anthropic: { name:'Anthropic (Claude)', icon:'◈' },
    google:    { name:'Google (Gemini)',     icon:'✦' },
    mistral:   { name:'Mistral AI',          icon:'🌊' },
    groq:      { name:'Groq',               icon:'⚡' },
  };

  const STATUS_CFG = {
    operational:    { color:'#10b981', bg:'rgba(16,185,129,.1)',  label:'Opérationnel' },
    degraded:       { color:'#f59e0b', bg:'rgba(245,158,11,.1)',  label:'Dégradé'      },
    partial_outage: { color:'#f97316', bg:'rgba(249,115,22,.1)',  label:'Partiel'      },
    outage:         { color:'#ef4444', bg:'rgba(239,68,68,.1)',   label:'Panne'        },
    maintenance:    { color:'#6366f1', bg:'rgba(99,102,241,.1)',  label:'Maintenance'  },
    unknown:        { color:'#6b7280', bg:'rgba(107,114,128,.1)', label:'Inconnu'      },
  };

  function cfg(s) { return STATUS_CFG[s] || STATUS_CFG.unknown; }

  // ── Sparkline SVG ─────────────────────────────────────────────────────────
  function sparkline(data, color) {
    const w=200, h=36, pad=2;
    if (!data || !data.length) return '';
    const pts = data.map((v,i) => {
      const x = pad + (i/(Math.max(data.length-1,1)))*(w-pad*2);
      const val = v==='operational'?1:v==='degraded'||v==='partial_outage'?0.5:0;
      const y = h - pad - val*(h-pad*2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const first = pts.split(' ')[0].split(',')[0];
    const last  = pts.split(' ').slice(-1)[0].split(',')[0];
    return `<svg width="${w}" height="${h}" style="display:block;width:100%">
      <defs>
        <linearGradient id="sg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="${first},${h} ${pts} ${last},${h}" fill="url(#sg${color.replace('#','')})"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"
        stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
  }

  // ── Heatmap 24h (blocs 15 min) ───────────────────────────────────────────
  function heatmap(entries, serviceId) {
    // On reconstitue 96 slots de 15 min sur les dernières 24h
    const now   = Date.now();
    const SLOTS = 96;
    const SLOT_MS = 15 * 60 * 1000;
    const slots = new Array(SLOTS).fill('unknown');

    for (const entry of entries) {
      const t = new Date(entry.timestamp).getTime();
      const age = now - t;
      if (age < 0 || age > SLOTS * SLOT_MS) continue;
      const idx = SLOTS - 1 - Math.floor(age / SLOT_MS);
      if (idx >= 0 && idx < SLOTS) {
        const st = entry.services?.[serviceId] || 'unknown';
        // Ne pas écraser une panne par unknown
        if (slots[idx] === 'unknown' || st !== 'unknown') slots[idx] = st;
      }
    }

    // Groupes de 4 slots (1h) → 24 colonnes, 4 lignes
    const COLS = 24, ROWS = 4;
    let html = `<div class="heatmap-label-row">
      <span>-24h</span><span>-18h</span><span>-12h</span><span>-6h</span><span>now</span>
    </div><div class="heatmap-grid">`;

    for (let c = 0; c < COLS; c++) {
      html += `<div class="heatmap-col">`;
      for (let r = 0; r < ROWS; r++) {
        const si = c * ROWS + r;
        const st = slots[si] || 'unknown';
        const color = cfg(st).color;
        const opacity = st === 'unknown' ? '0.15' : '1';
        const title = `${c}h${r*15 > 0 ? r*15+'min' : ''} · ${cfg(st).label}`;
        html += `<div class="heatmap-cell" style="background:${color};opacity:${opacity}" title="${title}"></div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
    return html;
  }

  // ── Durée depuis un timestamp ─────────────────────────────────────────────
  function sinceWhen(isoDate) {
    if (!isoDate) return null;
    const delta = Date.now() - new Date(isoDate).getTime();
    if (delta < 0) return null;
    const h = Math.floor(delta / 3600000);
    const m = Math.floor((delta % 3600000) / 60000);
    if (h > 0) return `${h}h${m > 0 ? m+'min' : ''}`;
    return `${m}min`;
  }

  // ── Timeline des incidents depuis l'historique ────────────────────────────
  function buildTimeline(entries) {
    // Détecter les transitions vers un état non-opérationnel
    const events = [];
    const lastStatus = {};

    for (const entry of entries) {
      const ts = entry.timestamp;
      for (const [svc, status] of Object.entries(entry.services || {})) {
        const prev = lastStatus[svc];
        if (prev !== undefined && prev === 'operational' && status !== 'operational' && status !== 'unknown') {
          events.push({ svc, status, start: ts, end: null });
        }
        if (prev !== undefined && prev !== 'operational' && prev !== 'unknown' && status === 'operational') {
          // Fin d'incident
          const open = [...events].reverse().find(e => e.svc === svc && e.end === null);
          if (open) open.end = ts;
        }
        lastStatus[svc] = status;
      }
    }

    return events.reverse().slice(0, 5);
  }

  // ── Badge ─────────────────────────────────────────────────────────────────
  function badge(status) {
    const c = cfg(status);
    return `<span class="badge" style="background:${c.bg};color:${c.color};border-color:${c.color}44">
      <span class="badge-dot" style="background:${c.color}"></span>${c.label}
    </span>`;
  }

  // ── Uptime depuis historique ──────────────────────────────────────────────
  function computeUptime(entries, serviceId) {
    if (!entries || !entries.length) return null;
    const relevant = entries.filter(e => e.services?.[serviceId] !== 'unknown');
    if (!relevant.length) return null;
    const ok = relevant.filter(e => e.services?.[serviceId] === 'operational').length;
    return ((ok / relevant.length) * 100).toFixed(1);
  }

  // ── Score santé global ────────────────────────────────────────────────────
  function globalHealthScore(entries) {
    const ids = Object.keys(PROVIDERS_META);
    const uptimes = ids.map(id => computeUptime(entries, id)).filter(v => v !== null).map(Number);
    if (!uptimes.length) return null;
    return (uptimes.reduce((a,b) => a+b, 0) / uptimes.length).toFixed(1);
  }

  // ── Graphique comparatif ──────────────────────────────────────────────────
  function compareChart(entries, svcs) {
    const rows = Object.entries(PROVIDERS_META).map(([id, meta]) => {
      const uptime = parseFloat(computeUptime(entries, id));
      const svc = svcs[id] || {};
      const c = cfg(svc.overall || 'unknown');
      return { id, name: meta.name.split(' ')[0], uptime: isNaN(uptime) ? null : uptime, color: c.color };
    });

    let html = `<div class="compare-section">
      <div class="compare-title-row">
        <span class="compare-title">Comparatif uptime 24h</span>
        <div class="compare-legend">
          <div class="compare-legend-item"><div class="compare-legend-dot" style="background:#10b981"></div>≥99%</div>
          <div class="compare-legend-item"><div class="compare-legend-dot" style="background:#f59e0b"></div>≥90%</div>
          <div class="compare-legend-item"><div class="compare-legend-dot" style="background:#ef4444"></div><90%</div>
        </div>
      </div>
      <div class="compare-rows">`;

    for (const r of rows) {
      const pct = r.uptime ?? 0;
      const barColor = pct >= 99 ? '#10b981' : pct >= 90 ? '#f59e0b' : '#ef4444';
      html += `<div class="compare-row">
        <span class="compare-name">${r.name}</span>
        <div class="compare-track">
          <div class="compare-fill" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <span class="compare-pct" style="color:${barColor}">${r.uptime !== null ? r.uptime+'%' : '—'}</span>
      </div>`;
    }

    html += `</div></div>`;
    return html;
  }

  // ── Score anneau SVG ──────────────────────────────────────────────────────
  function healthRing(score) {
    if (score === null) return '';
    const pct   = parseFloat(score);
    const color = pct >= 99 ? '#10b981' : pct >= 90 ? '#f59e0b' : '#ef4444';
    const R     = 18, C = 2 * Math.PI * R;
    const dash  = (pct / 100) * C;
    return `<svg width="48" height="48" class="health-ring">
      <circle cx="24" cy="24" r="${R}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/>
      <circle cx="24" cy="24" r="${R}" fill="none" stroke="${color}" stroke-width="4"
        stroke-dasharray="${dash.toFixed(1)} ${C.toFixed(1)}"
        stroke-linecap="round"
        transform="rotate(-90 24 24)"/>
      <text x="24" y="28" text-anchor="middle" font-size="9" font-weight="700" fill="${color}"
        font-family="system-ui">${Math.round(pct)}%</text>
    </svg>`;
  }

  // ── Render ────────────────────────────────────────────────────────────────
  async function render() {
    const container = document.getElementById('status-content');
    const bannerContainer = document.getElementById('incident-banner-container');
    try {
      const [statusRes, histRes] = await Promise.all([
        fetch('status.json?t=' + Date.now()),
        fetch('status-history.json?t=' + Date.now()).catch(() => null),
      ]);
      const data    = await statusRes.json();
      const hist    = histRes?.ok ? await histRes.json() : { entries:[] };
      const svcs    = data.services;
      const entries = hist.entries || [];

      // Global status
      const allOk   = Object.values(svcs).every(s => ['operational','unknown'].includes(s.overall));
      const hasPb   = Object.values(svcs).some(s => !['operational','unknown'].includes(s.overall));
      const gColor  = !hasPb ? '#10b981' : '#f59e0b';
      const gText   = !hasPb ? 'Tous les services sont opérationnels' : 'Perturbations en cours sur certains services';
      const updated = new Date(data.last_updated).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

      // Bandeau incident si panne active
      const activeIncidents = Object.entries(svcs).filter(([,s]) => ['outage','partial_outage'].includes(s.overall));
      if (activeIncidents.length) {
        const names = activeIncidents.map(([id]) => PROVIDERS_META[id]?.name || id).join(', ');
        bannerContainer.innerHTML = `<div class="incident-banner">
          <div class="incident-banner-dot"></div>
          <strong>Incident actif :</strong> ${names} — ${activeIncidents[0][1].description || 'Service dégradé ou en panne'}
          <a href="https://status.openai.com" target="_blank">→ Page officielle</a>
        </div>`;
      }

      // Histogramme par provider
      const histByProvider = {};
      for (const key of Object.keys(PROVIDERS_META)) {
        histByProvider[key] = entries.map(e => e.services?.[key] || 'unknown');
      }

      // Score santé
      const score = globalHealthScore(entries);
      const scoreColor = score !== null ? (parseFloat(score) >= 99 ? '#10b981' : parseFloat(score) >= 90 ? '#f59e0b' : '#ef4444') : '#6b7280';

      // Timeline
      const timeline = buildTimeline(entries);

      let html = `
        <div class="global-bar" style="background:${!hasPb?'rgba(16,185,129,.08)':'rgba(245,158,11,.08)'};border:1px solid ${gColor}33">
          <span class="global-dot" style="background:${gColor};box-shadow:0 0 10px ${gColor}"></span>
          <span class="global-text" style="color:${gColor}">${gText}</span>
          <span class="global-time">MÀJ ${updated} · auto 15 min</span>
        </div>`;

      // Score santé global
      if (score !== null) {
        html += `<div class="health-score-row">
          ${healthRing(score)}
          <div class="health-info">
            <div class="health-label">Santé globale · ${entries.length} mesures</div>
            <div class="health-value" style="color:${scoreColor}">${score}%</div>
          </div>
          <div class="health-bar-track" style="max-width:260px">
            <div class="health-bar-fill" style="width:${score}%;background:${scoreColor}"></div>
          </div>
        </div>`;
      }

      // Mini stat cards
      html += `<div class="stats-grid">
        ${Object.entries(PROVIDERS_META).map(([id,meta]) => {
          const svc    = svcs[id];
          const uptime = computeUptime(entries, id);
          const c      = cfg(svc?.overall||'unknown');
          return `<div class="stat-card" style="border-color:${c.color}33">
            <div class="stat-icon">${meta.icon}</div>
            <div class="stat-name">${meta.name.split(' ')[0]}</div>
            <div class="stat-pct" style="color:${c.color}">${uptime !== null ? uptime+'%' : c.label}</div>
          </div>`;
        }).join('')}
      </div>`;

      // Graphique comparatif
      html += compareChart(entries, svcs);

      // Section detail providers
      html += `<div class="section-label">
        <span class="section-title">DÉTAIL PAR SERVICE — 24H</span>
        <div class="section-line"></div>
        <span style="font-size:10px;color:var(--text-dimmer);white-space:nowrap">${entries.length} points de données</span>
      </div>`;

      for (const [id, meta] of Object.entries(PROVIDERS_META)) {
        const svc      = svcs[id] || { overall:'unknown', description:'', components:[] };
        const c        = cfg(svc.overall);
        const issues   = svc.components.filter(comp => comp.status !== 'operational');
        const uptime   = computeUptime(entries, id);
        const sparkData= histByProvider[id];

        // Durée incident si actif
        let durationHtml = '';
        if (svc.overall !== 'operational' && svc.overall !== 'unknown') {
          // chercher updated_at depuis les composants en issue
          const issueComp = issues[0];
          const since = issueComp ? sinceWhen(issueComp.updated_at) : null;
          if (since) {
            durationHtml = `<span class="incident-duration">⏱ depuis ${since}</span>`;
          }
        }

        html += `
        <div class="provider-card">
          <button class="provider-btn" onclick="toggleCard('${id}',this)">
            <div class="provider-row">
              <span class="provider-icon">${meta.icon}</span>
              <div class="provider-info">
                <div class="provider-name-row">
                  <span class="provider-name">${meta.name}</span>
                  ${badge(svc.overall)}
                  ${issues.length ? `<span style="font-size:10px;color:#f59e0b;background:rgba(245,158,11,.1);padding:1px 6px;border-radius:10px">⚠ ${issues.length}</span>` : ''}
                  ${durationHtml}
                </div>
                <div class="provider-desc">${svc.description || '—'}</div>
              </div>
              <div class="provider-uptime">
                <div class="provider-pct" style="color:${c.color}">${uptime !== null ? uptime+'%' : '—'}</div>
                <div class="provider-label">24h uptime</div>
              </div>
              <span class="provider-chevron">▼</span>
            </div>
            <div class="sparkline-row">
              <div style="flex:1">${sparkline(sparkData, c.color)}</div>
              <div class="sparkline-labels">
                <span class="sparkline-label">-24h</span>
                <span class="sparkline-label">now</span>
              </div>
            </div>
          </button>
          <div class="components-panel" id="panel-${id}">
            <div class="heatmap-section">
              <div style="font-size:9px;font-weight:700;color:var(--text-dimmer);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px">Heatmap 24h · blocs de 15 min</div>
              ${heatmap(entries, id)}
            </div>
            ${timeline.filter(e => e.svc === id).length ? `
            <div class="timeline-section">
              <div class="timeline-title">Incidents récents détectés</div>
              ${timeline.filter(e => e.svc === id).map((ev, i, arr) => {
                const c2 = cfg(ev.status);
                const startFmt = new Date(ev.start).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
                const endFmt   = ev.end ? new Date(ev.end).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : 'en cours';
                return `<div class="timeline-item">
                  ${i < arr.length - 1 ? '<div class="timeline-line"></div>' : ''}
                  <div class="timeline-dot" style="background:${c2.color}"></div>
                  <div class="timeline-body">
                    <div class="timeline-event">${c2.label}</div>
                    <div class="timeline-meta">${startFmt} → ${endFmt}</div>
                  </div>
                </div>`;
              }).join('')}
            </div>` : ''}
            <div class="components-grid">
              ${svc.components.map(comp => `
                <div class="component-row" style="${comp.status!=='operational'?'background:rgba(245,158,11,.04)':''}">
                  <span class="component-name${comp.status!=='operational'?' issue':''}">${comp.name}</span>
                  <span class="component-status">
                    <span class="component-dot" style="background:${cfg(comp.status).color}"></span>
                    <span style="color:${cfg(comp.status).color}">${cfg(comp.status).label}</span>
                  </span>
                </div>`).join('')}
            </div>
            <div class="components-footer">
              ${svc.components.filter(c=>c.status==='operational').length}/${svc.components.length} composants opérationnels
            </div>
          </div>
        </div>`;
      }

      html += `
        <div class="info-box">
          📡 Sources officielles :
          <a href="https://status.openai.com" target="_blank">status.openai.com</a> ·
          <a href="https://status.anthropic.com" target="_blank">status.anthropic.com</a> ·
          <a href="https://status.cloud.google.com" target="_blank">status.cloud.google.com</a> ·
          <a href="https://status.mistral.ai" target="_blank">status.mistral.ai</a> ·
          <a href="https://groqstatus.com" target="_blank">groqstatus.com</a><br>
          ⏱ Vérification automatique toutes les 15 minutes via GitHub Actions ·
          Historique sur ${Math.round(entries.length/4)} heures
        </div>`;

      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = `<div class="loading">
        <div style="font-size:32px;margin-bottom:12px">⚡</div>
        <p style="color:var(--text-dim)">Données non disponibles.<br>Lance le workflow <code>status.yml</code> pour générer les données.</p>
      </div>`;
    }
  }

  function toggleCard(id, btn) {
    const panel = document.getElementById('panel-' + id);
    const open  = panel.classList.toggle('open');
    btn.classList.toggle('open', open);
    btn.querySelector('.provider-chevron').textContent = open ? '▲' : '▼';
  }

  render();
  </script>
</body>
</html>
